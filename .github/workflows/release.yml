# ─────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布（跨平台：Windows + macOS）
# 打一个 v* 标签（如 v0.2.10）推上来，会在 Windows 与 macOS 两个 runner 上并行
# 构建、用更新私钥签名，并把各自的安装包 + .sig + latest.json 上传到同一个 GitHub Release。
#   · Windows → NSIS 安装包（.exe）
#   · macOS   → universal（Intel + Apple Silicon 通用）.dmg / .app
# tauri-action 会把两端的平台条目合并进同一份 latest.json，应用端据此自动升级。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 更新私钥文件全文（单行无换行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 更新私钥密码
#
# 关于 macOS 签名/公证（可选，未配则产未签名包）：
#   未签名 .dmg 用户首次打开会被 Gatekeeper 拦，需右键→打开，或
#   `xattr -dr com.apple.quarantine /Applications/Polaris.app`。
#   若要消除提示并让 mac 自动更新稳定生效，再补这些 secret 并在 tauri.conf 配 signingIdentity：
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY /
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID（这里默认不强制，留空即跳过签名）。
# ─────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify tagged source
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build
      - name: Rust library tests
        working-directory: src-tauri
        run: cargo test --lib
      - name: CLI compile guard
        working-directory: src-tauri
        run: cargo check -p polaris-cli

  release:
    needs: verify
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows：只出 NSIS 安装包（保持与原有产物一致）
          # --features voice-live：桌面实时语音输入(麦克风 cpal+热键 rdev+注入 enigo,
          #   自动带上 voice-asr 的 sherpa-onnx + SenseVoice 识别核)。
          #   注:voice-asr 已拆分为「仅识别核」,桌面要本机录音必须用 voice-live。
          - platform: windows-latest
            args: "--bundles nsis --features voice-live"
            rust_targets: ""
          # macOS：universal 通用二进制（一个包同时覆盖 Intel 与 Apple Silicon）
          # 本版 mac 暂不开 voice-live：universal 需把两架构的 sherpa/onnxruntime dylib lipo
          # 成通用并配 @rpath,这套无 mac 真机/CI 无法验证;缺 dylib 会导致 app 启动即崩,
          # 风险太高。mac 本地语音延后到能在 mac CI 验证后再补(Win 已端到端实测,先发 Win)。
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # voice-asr 的 sherpa-rs 用 bindgen 生成绑定 → 需 libclang。
      #   · Windows runner 预装 LLVM 于 C:\Program Files\LLVM,显式指给 bindgen 最稳。
      #   · macOS 的 libclang 随 Xcode 命令行工具走,clang-sys 经 xcrun 自动发现,无需额外装。
      - name: Point bindgen at libclang (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $p = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$p\libclang.dll")) { choco install llvm -y }
          "LIBCLANG_PATH=$p" | Out-File -FilePath $env:GITHUB_ENV -Append

      # macOS：audiopus_sys 从源码静态编译 libopus(universal 每个 arch 各编一次),
      # 需要 autotools(autoreconf/automake/libtool)。runner 默认没有 autoreconf,
      # 不装会报 `autoreconf: command not found` → Failed to autogen Opus。
      # 不走 `brew install opus`：Homebrew 只出 host 架构(arm64),x86_64 slice 链不上。
      - name: Install macOS build deps (autotools for audiopus/libopus)
        if: matrix.platform == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 不传任何 APPLE_* 环境变量：空字符串会让 Tauri 的 bundler 误以为有证书而尝试
          # `security import ""` → SecKeychainItemImport 失败。mac 走 ad-hoc 签名
          # (tauri.conf bundle.macOS.signingIdentity = "-")，根本不需要 Apple 证书。
        with:
          # tauri-action 只负责「构建 + 用更新私钥签名」,不在此处建 Release:
          # 两个平台的产物要合并进同一份 latest.json,得等两边都跑完 → 交给下面的 publish job。
          args: ${{ matrix.args }}

      - name: Upload bundles as artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/universal-apple-darwin/release/bundle/**

  # ─────────────────────────────────────────────────────────────
  # 发布：等两个平台都构建完 → 收齐安装包与 .sig → 合并成一份 latest.json →
  # 建 GitHub Release 并把三者一起上传。应用端的更新端点
  # (tauri.conf plugins.updater.endpoints) 读的就是 releases/latest/download/latest.json。
  #
  # token 优先用 GH_PAT(仓库 Secrets 里配一个有 repo/contents:write 权限的 PAT)。
  # 本账号的 Actions GITHUB_TOKEN 建 Release 曾返回 "Resource not accessible by
  # integration",配了 GH_PAT 就绕开;没配则回落 GITHUB_TOKEN 再试一次。
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish release + latest.json
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect bundles & build latest.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          mkdir -p dist
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Windows: NSIS 安装包 + 其 .sig(createUpdaterArtifacts=true 时由 tauri 生成)
          win_exe=$(find artifacts -path '*/nsis/*' -name '*-setup.exe' | head -1)
          win_sig=$(find artifacts -path '*/nsis/*' -name '*-setup.exe.sig' | head -1)
          # macOS: 更新走 .app.tar.gz(不是 dmg);dmg 只作为人工下载用
          mac_tar=$(find artifacts -name '*.app.tar.gz' | head -1)
          mac_sig=$(find artifacts -name '*.app.tar.gz.sig' | head -1)
          mac_dmg=$(find artifacts -name '*.dmg' | head -1)

          [ -n "$win_exe" ] && [ -n "$win_sig" ] || { echo "::error::缺 Windows 安装包或其 .sig"; exit 1; }
          [ -n "$mac_tar" ] && [ -n "$mac_sig" ] || { echo "::error::缺 macOS .app.tar.gz 或其 .sig"; exit 1; }

          # ⚠ 产物必须改成纯 ASCII 名再上传：productName 是「教师助手」,tauri 出的包名带中文,
          # 而 GitHub 上传 Release 资产时会把非 ASCII 字符**静默剥掉**
          # (教师助手_1.0.1_x64-setup.exe → _1.0.1_x64-setup.exe)。
          # latest.json 里若还写原名 → 客户端下载必 404:检查更新照常弹窗,一点更新就失败。
          # v1.0.1 就是这么坏的(CI 全绿)。签名是对**文件字节**签的,改名不影响验签。
          win_dest="TeacherAgent_${VERSION}_x64-setup.exe"
          mac_dest="TeacherAgent.app.tar.gz"
          cp "$win_exe" "dist/$win_dest"
          cp "$mac_tar" "dist/$mac_dest"
          [ -n "$mac_dmg" ] && cp "$mac_dmg" "dist/TeacherAgent_${VERSION}_universal.dmg" || true

          # 上传前自查:dist 里不许再有非 ASCII 文件名,否则又会被 GitHub 悄悄改名。
          for f in dist/*; do
            case "$(basename "$f")" in
              *[!\ -~]*) echo "::error::产物名含非 ASCII 字符,上传后会被 GitHub 剥掉: $f"; exit 1 ;;
            esac
          done

          # latest.json:两个平台合进同一份。mac 是 universal 包,两个架构键都指向它。
          # 传的是**改名后**的文件名,与实际上传的资产名严格一致。
          python3 - "$VERSION" "$base" "$win_dest" "$win_sig" \
                    "$mac_dest" "$mac_sig" <<'PY'
          import json, sys, datetime, pathlib
          version, base, win_name, win_sig, mac_name, mac_sig = sys.argv[1:7]
          win_url = f"{base}/{win_name}"
          mac_url = f"{base}/{mac_name}"
          mac_sig_text = pathlib.Path(mac_sig).read_text().strip()
          entry = {"signature": mac_sig_text, "url": mac_url}
          out = {
              "version": version,
              "notes": f"教师助手 {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
                  .strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "windows-x86_64": {
                      "signature": pathlib.Path(win_sig).read_text().strip(),
                      "url": win_url,
                  },
                  "darwin-x86_64": entry,
                  "darwin-aarch64": entry,
              },
          }
          pathlib.Path("dist/latest.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2))
          print(json.dumps(out, ensure_ascii=False, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: 教师助手 ${{ github.ref_name }}
          prerelease: false
          # 必须是 latest release,应用端读的是 /releases/latest/download/latest.json
          make_latest: true
          files: dist/*

      # latest.json 里 url 的文件名必须和 dist 里真实的包对得上。v1.0.1 栽在这:CI 全绿、
      # Release 建好、latest.json 格式完美,但 url 写的是被 GitHub 剥掉中文前的原名 → 全部 404。
      #
      # 这里**不**再 curl github url:本仓是 private,匿名请求必然 404,曾让 v1.0.2 的
      # 这一步红着收场(包其实都传对了)。github url 在 private 期间只是「文件名载体」,
      # 客户端靠 updater.rs::mirror_candidates 从中剥出文件名去自托管源下载。
      # 真正的下载可达性由下面「Verify self-hosted endpoint」按真实 HTTP 结果卡。
      - name: Verify latest.json filenames match artifacts
        shell: bash
        run: |
          set -euo pipefail
          urls=$(python3 -c 'import json;d=json.load(open("dist/latest.json"));[print(p["url"]) for p in d["platforms"].values()]' | sort -u)
          fail=0
          for u in $urls; do
            f="${u##*/}"
            if [ -f "dist/$f" ]; then echo "✓ $f"; else echo "✗ latest.json 指向 $f,但 dist 里没有"; fail=1; fi
          done
          [ "$fail" = "0" ] || { echo "::error::latest.json 的文件名与产物对不上,自动更新会 404"; exit 1; }

      # ── 自托管分发（Cloudflare R2）─────────────────────────────
      # 客户端 endpoints 第一顺位是 R2 上的 downloads/latest.json,
      # updater.rs::mirror_candidates 下载安装包时也优先走这里(国内可达性最好、不看 github 脸色)。
      # 所以这一步必须与 GitHub Release 同版本同步,否则自托管源会一直供旧包。
      #
      # 用 R2 而非 Pages:Pages 单文件上限 25MiB,本项目装包 win ~119MB / mac ~235MB,差一个数量级。
      #
      # 两个渠道共用同一份 latest.json(里面的 url 指向 github),自托管那一跳由客户端按文件名拼,
      # 因此 R2 掉线/限流时客户端仍能自动回落 github,不会把自己锁死在单一渠道。
      #
      # 需在仓库 Secrets 配 CLOUDFLARE_API_TOKEN(Object Read & Write) 与 CLOUDFLARE_ACCOUNT_ID。
      # **没配就必须让发版失败**:本仓 private,github 那几个候选源匿名下载全是 404,
      # 自托管是客户端唯一能下到包的源。以前这里只 warning 就放过,结果 v1.0.2 发出去时
      # R2 一个字节都没传,用户端「检查更新失败」,而 CI 看着是绿的。宁可红在这里。
      - name: Upload to Cloudflare R2
        id: r2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::未配 CLOUDFLARE_API_TOKEN/ACCOUNT_ID。private 仓下自托管是唯一活源,不能跳过。补发见 scripts/publish-r2.ps1"
            exit 1
          fi
          # latest.json 最后传:装包先就位,避免「latest.json 已指新版、包还没上去」的空窗期。
          for f in $(ls dist | grep -v '^latest.json$'); do
            echo "→ $f"
            npx --yes wrangler@4 r2 object put "teacher-agent-dist/downloads/$f" \
              --file "dist/$f" --remote
          done
          npx --yes wrangler@4 r2 object put "teacher-agent-dist/downloads/latest.json" \
            --file dist/latest.json --content-type application/json --remote

      # 自托管是 private 仓下唯一的活源,必须实测拿到的是 JSON 且版本号对得上,而不是只看 HTTP 200。
      # 两个域都验:自定义域给 v1.0.3+,r2.dev 给 v1.0.2 及更早那批写死它的老客户端。同一个桶。
      - name: Verify self-hosted endpoint
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          fail=0
          for BASE in "https://teacher-dl.llmwiki.cloud/downloads" \
                      "https://pub-667c9f15cb424a8db14d7b4ef7bbb481.r2.dev/downloads"; do
            echo "── $BASE"
            ok=0
            for i in 1 2 3 4 5; do
              got=$(curl -fsSL "$BASE/latest.json" | python3 -c \
                'import sys,json; print(json.load(sys.stdin)["version"])' 2>/dev/null) || got=""
              if [ "$got" = "$VERSION" ]; then echo "  latest.json 已就绪: $got"; ok=1; break; fi
              echo "  第 $i 次:拿到 '$got',期望 '$VERSION',10s 后重试(边缘生效有延迟)"
              sleep 10
            done
            [ "$ok" = "1" ] || { echo "::error::$BASE 的 latest.json 未同步到 $VERSION"; fail=1; continue; }
            # 装包也得真在:客户端就是从这里拉包,404 会白耗一次重试。
            for f in $(ls dist | grep -v '^latest.json$'); do
              code=$(curl -sI -o /dev/null -w '%{http_code}' "$BASE/$f" || echo 000)
              [ "$code" = "200" ] && echo "  ✓ $code $f" || { echo "::error::自托管缺包: $code $BASE/$f"; fail=1; }
            done
          done
          [ "$fail" = "0" ] || exit 1
