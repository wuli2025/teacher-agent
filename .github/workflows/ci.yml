name: CI

# 在 push / PR 到 main 时跑: Rust 单测(硬门槛) + clippy/fmt(建议性) + 前端构建。
# 目的: 把这次安全/稳定加固锁住, 别让回归悄悄溜进来。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # tauri::generate_context! 在编译期要求 frontendDist(../dist)存在,否则 proc macro panic。
      # 后端单测不需要真前端,放个 stub index.html 满足它即可(真前端由 frontend job 验)。
      - name: Stub frontend dist (满足 tauri generate_context!)
        shell: bash
        run: mkdir -p ../dist && echo '<!doctype html><title>stub</title>' > ../dist/index.html
      # 硬门槛: 全 workspace 单测必须过 (含 kb 路径穿越 / codex_proxy 解析边界等回归测试)
      # --exclude polaris-cli: 它依赖主 lib 的 server feature, 若与本 job 的桌面(默认)feature
      # 一起选中会被 cargo 统一 feature → 主 lib 同时开 tauri+server 两套 AppHandle 而 E0308。
      # polaris-cli 的编译守护放 forge-matrix(server feature 同侧, cache 共享, 见下)。
      - name: Test
        run: cargo test --workspace --exclude polaris-cli
      # 建议性: 先不 -D warnings, 等存量 lint 清干净再收紧成硬门槛
      - name: Format check
        run: cargo fmt --all --check
        continue-on-error: true
      - name: Clippy
        run: cargo clippy --workspace --exclude polaris-cli --all-targets
        continue-on-error: true

  # Forge 跨平台引擎(PPT/视频/TTS)三系统矩阵 —— PRD §08 的「windows+macos+docker 三 job」。
  # 用 server feature(无 Tauri 的纯引擎，三平台同一份代码)跑 forge 单测:
  # macOS runner 上跑通 = 真·macOS 验证(无需 Mac 硬件)。
  forge-matrix:
    name: Forge engine (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # macOS: audiopus_sys 从源码静态编 libopus 需要 autotools(autoreconf),
      # runner 默认没有 → `autogen.sh: autoreconf: command not found`(与 release.yml 同因同修)。
      - name: Install macOS build deps (autotools for audiopus/libopus)
        if: matrix.os == 'macos-latest'
        run: brew install autoconf automake libtool
      # 引擎编译(server feature) + forge 单测(png/pptx 结构/数页/hex 解码) —— 跨平台一致性守门
      - name: Forge engine build + tests
        run: cargo test --no-default-features --features server --lib forge
      # polaris-cli(polaris-forge 命令行)编译守护: 它拉主 lib 的 server feature,
      # 与本 job 同侧, 增量编译近零成本。不能进 rust job 的 --workspace(feature 统一会炸)。
      - name: polaris-cli build check
        run: cargo check -p polaris-cli

  # macOS「真能出片」运行时验证:装真 Chrome,在 macOS runner 上跑 deck→截图→pptx 全流水线
  # (无需 Mac 硬件)。证明 macOS 不止编译过,而是真能产出成品。
  forge-e2e-macos:
    name: Forge e2e (macOS · 真 Chrome 出 pptx)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # 同 forge-matrix: macOS 编 audiopus/libopus 需要 autotools。
      - name: Install macOS build deps (autotools for audiopus/libopus)
        run: brew install autoconf automake libtool
      - name: Install Google Chrome
        run: brew install --cask google-chrome || true
      - name: 真实 deck→pptx + 文本提取 on macOS
        # when_chromium_present 同时匹配 deck_to_pptx_e2e 与 extract_text_rects 两个真 Chrome e2e。
        run: cargo test --no-default-features --features server --lib when_chromium_present -- --nocapture

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # npm run build = vue-tsc --noEmit && vite build (类型检查 + 打包)
      - run: npm run build
